<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --accent: #0ea5e9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); 
    color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; 
  }

  /* Top Header */
  .top { 
    padding: 15px; background: var(--bg-card); box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
    display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;
  }
  .top h2 { margin: 0; font-size: 20px; color: var(--accent); }
  
  .header-actions { display: flex; gap: 10px; }
  .btn-small { 
    background: var(--bg-input); color: var(--text-main); border: none; 
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; 
    font-family: 'Poppins', sans-serif; transition: 0.2s;
  }

  /* Floating Add Button */
  .fab-add {
    position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px;
    background: var(--accent); color: white; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; z-index: 90;
  }

  /* Notes Grid/List */
  #notes-container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
  
  .note-card {
    background: var(--bg-card); padding: 15px; border-radius: 12px; 
    border-left: 4px solid var(--accent); display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; touch-action: pan-y; 
  }
  .note-card.dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed var(--accent); }
  .note-header { display: flex; justify-content: space-between; align-items: center; }
  .note-date { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  
  .note-controls { display: flex; gap: 10px; align-items: center; }
  .drag-handle { cursor: grab; font-size: 18px; color: var(--text-muted); padding: 5px; }
  .btn-delete { 
    background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; 
    border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; 
    justify-content: center; font-size: 14px; cursor: pointer;
  }
  .note-text { font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
  .note-img { max-width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover; }
  audio { width: 100%; height: 40px; margin-top: 5px; }

  /* Checkbox and Task Styles */
  .task-checkbox { margin: 0 6px 0 0; vertical-align: middle; cursor: pointer; accent-color: var(--success); width: 16px; height: 16px; }
  .task-done { text-decoration: line-through; color: var(--text-muted); transition: 0.2s; }

  /* Full Page Editor Overlay */
  .editor-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-main); z-index: 200; display: none; flex-direction: column;
  }
  .editor-overlay.active { display: flex; }

  .editor-header {
    padding: 15px; background: var(--bg-card); display: flex; 
    justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .btn-close-editor {
    background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none;
    padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
  }

  .editor-body { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
  
  .rich-input-container {
    position: relative; background: var(--bg-card); border-radius: 12px;
    border: 2px solid var(--bg-input); display: flex; flex-direction: column; min-height: 200px;
  }
  .rich-input-container:focus-within { border-color: var(--accent); }
  
  textarea {
    flex: 1; width: 100%; padding: 15px; background: transparent; border: none;
    color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 15px;
    resize: none; outline: none; box-sizing: border-box;
  }

  .inline-toolbar {
    display: flex; gap: 12px; padding: 10px 15px; background: rgba(0, 0, 0, 0.2);
    border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; align-items: center;
  }
  .media-btn {
    background: var(--bg-input); color: var(--text-main); border: none;
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s;
  }
  .media-btn:active { transform: scale(0.9); }
  .media-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  .preview-section { display: flex; flex-direction: column; gap: 10px; }
  .preview-wrapper { position: relative; max-width: 100%; }
  .preview-img { max-width: 100%; border-radius: 8px; max-height: 180px; object-fit: cover; }
  .btn-remove-media {
    position: absolute; top: 5px; right: 5px; background: var(--danger); color: white;
    border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px;
  }

  /* Undo Snackbar */
  #snackbar {
    visibility: hidden; min-width: 250px; background-color: var(--bg-input); color: #fff;
    text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed;
    z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); display: flex;
    justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s, bottom 0.3s; font-size: 14px; border: 1px solid var(--accent);
  }
  #snackbar.show { visibility: visible; opacity: 1; bottom: 90px; }
  .undo-btn {
    color: var(--accent); font-weight: bold; cursor: pointer; border: none; background: none;
    margin-left: 15px; font-family: inherit; font-size: 14px; padding: 5px 10px; border-radius: 6px;
  }
  .undo-btn:hover { background: rgba(14, 165, 233, 0.1); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
    background: var(--bg-card); display: flex; justify-content: space-around;
    align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 100;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted); font-size: 11px;
    display: flex; flex-direction: column; align-items: center; cursor: pointer;
    text-decoration: none; transition: 0.2s;
  }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  .action-fab {
    background: var(--accent); color: white; width: 50px; height: 50px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4);
    cursor: pointer; text-decoration: none; margin-top: -20px; 
  }
</style>
</head>
<body>

<input type="file" id="imageInput" accept="image/*" style="display: none;">
<input type="file" id="importInput" accept=".json" style="display: none;">

<div class="top">
  <h2>📝 Smart Notes</h2>
  <div class="header-actions">
    <button class="btn-small" onclick="exportNotes()">📤 Export</button>
    <button class="btn-small" onclick="document.getElementById('importInput').click()">📥 Import</button>
  </div>
</div>

<div id="notes-container"></div>

<div class="fab-add" onclick="openEditor()">➕</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-header">
    <span style="font-weight: 600; font-size: 16px;">Edit Note</span>
    <button class="btn-close-editor" onclick="closeEditor()">✕ Save & Close</button>
  </div>
  
  <div class="editor-body">
    <div class="rich-input-container">
      <textarea id="noteText" placeholder="Start typing your note here..."></textarea>
      <div class="inline-toolbar">
        <button class="media-btn" title="Add Photo" onclick="document.getElementById('imageInput').click()">📷</button>
        <button class="media-btn" id="inlineVoiceBtn" title="Record Voice" onclick="toggleRecording()">🎙️</button>
        <button class="media-btn" title="Add Checkbox" onclick="insertCheckbox()">☑️</button>
        <span id="recordingStatus" style="font-size: 12px; color: var(--text-muted);"></span>
      </div>
    </div>
    <div class="preview-section" id="previewSection"></div>
  </div>
</div>

<div id="snackbar">
  <span>Note deleted</span>
  <button class="undo-btn" onclick="undoDelete()">UNDO</button>
</div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  <a href="index.html" class="action-fab">🧮</a>
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

<script>
/* =========================================
   1. IndexedDB Engine Setup
   ========================================= */
const DB_NAME = "ProSmartNotesV2";
const STORE_NAME = "notes_multimedia";
let db;
let currentEditingId = null; 
let currentMedia = { img: null, audio: null };

// Undo State Variables
let lastDeletedNote = null;
let undoTimeout = null;

const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains(STORE_NAME)) {
    const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    store.createIndex("order", "order", { unique: false });
  }
};
request.onsuccess = (e) => { db = e.target.result; loadNotes(); };

/* =========================================
   2. Date Formatting
   ========================================= */
function getFormattedDate() {
  const date = new Date();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  return `${date.getDate()} ${monthNames[date.getMonth()]}, ${dayNames[date.getDay()]}, ${date.getFullYear()}`;
}

/* =========================================
   3. Editor Logic & Hardware Back
   ========================================= */
function openEditor(noteId = null) {
  currentEditingId = noteId;
  currentMedia = { img: null, audio: null };
  document.getElementById("noteText").value = "";
  document.getElementById("previewSection").innerHTML = "";
  
  if (noteId) {
    const tx = db.transaction(STORE_NAME, "readonly");
    tx.objectStore(STORE_NAME).get(noteId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        document.getElementById("noteText").value = note.text || "";
        currentMedia.img = note.img;
        currentMedia.audio = note.audio;
        updatePreviewUI();
      }
    };
  }
  document.getElementById("editorOverlay").classList.add("active");
  history.pushState({ isEditing: true }, "");
}

window.addEventListener('popstate', function (event) {
  if (document.getElementById("editorOverlay").classList.contains("active")) {
    closeEditor(false); 
  }
});

function closeEditor(shouldPopHistory = true) {
  autoSaveCurrentNote();
  document.getElementById("editorOverlay").classList.remove("active");
  if (shouldPopHistory && history.state && history.state.isEditing) history.back();
}

function autoSaveCurrentNote() {
  const text = document.getElementById("noteText").value.trim();
  if (!text && !currentMedia.img && !currentMedia.audio) return;

  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);

  if (currentEditingId) {
    store.get(currentEditingId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        note.text = text; note.img = currentMedia.img; note.audio = currentMedia.audio;
        store.put(note);
      }
    };
  } else {
    store.add({ text: text, img: currentMedia.img, audio: currentMedia.audio, date: getFormattedDate(), order: Date.now() });
  }
  tx.oncomplete = () => loadNotes();
}

/* =========================================
   NEW: Insert Checkbox Logic
   ========================================= */
function insertCheckbox() {
  const textarea = document.getElementById("noteText");
  const startPos = textarea.selectionStart;
  const endPos = textarea.selectionEnd;
  const text = textarea.value;
  
  const textBefore = text.substring(0, startPos);
  const textAfter = text.substring(endPos, text.length);
  
  // Insert special unicode characters for checkbox (☐ empty, ☑ checked)
  textarea.value = textBefore + "☐ " + textAfter;
  
  // Set cursor right after the newly inserted checkbox
  textarea.selectionStart = textarea.selectionEnd = startPos + 2;
  textarea.focus();
}

// Function to convert normal text to HTML with active checkboxes and strike-through
function renderNoteText(text, noteId) {
  if (!text) return '';
  // Encode HTML to prevent issues
  let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  
  let checkboxIndex = 0;
  // Match the checkbox (☐ or ☑) and the text after it until the end of the line
  return escaped.replace(/(☐|☑)(.*?)(?=\n|$)/g, (match, box, content) => {
    let isChecked = box === '☑';
    let idx = checkboxIndex++;
    let textClass = isChecked ? 'class="task-done"' : '';
    let checkedAttr = isChecked ? 'checked' : '';
    
    return `<input type="checkbox" class="task-checkbox" ${checkedAttr} onclick="toggleTask(event, ${noteId}, ${idx})"><span ${textClass}>${content}</span>`;
  });
}

// Toggle checkbox state inside the database
window.toggleTask = function(event, noteId, taskIndex) {
  event.stopPropagation(); // Stops the note editor from opening when clicking the checkbox
  
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  
  store.get(noteId).onsuccess = (e) => {
    const note = e.target.result;
    if (note && note.text) {
      let currentIdx = 0;
      note.text = note.text.replace(/(☐|☑)/g, (match) => {
        if (currentIdx === taskIndex) {
          currentIdx++;
          return match === '☐' ? '☑' : '☐'; // Flip state
        }
        currentIdx++;
        return match;
      });
      store.put(note);
    }
  };
  tx.oncomplete = () => loadNotes(); // Refresh to show strike-through
};

/* =========================================
   4. Media Management
   ========================================= */
document.getElementById("imageInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 800;
      let width = img.width, height = img.height;
      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      currentMedia.img = canvas.toDataURL("image/jpeg", 0.7); 
      updatePreviewUI();
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
  const btn = document.getElementById("inlineVoiceBtn");
  const status = document.getElementById("recordingStatus");
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => { currentMedia.audio = reader.result; updatePreviewUI(); };
        reader.readAsDataURL(audioBlob);
      };
      mediaRecorder.start();
      isRecording = true;
      btn.innerHTML = "⏹️"; btn.classList.add("recording"); status.innerText = "Recording...";
    } catch (err) { alert("Microphone permission denied!"); }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.innerHTML = "🎙️"; btn.classList.remove("recording"); status.innerText = "";
  }
}

function removeMedia(type) { currentMedia[type] = null; updatePreviewUI(); }

function updatePreviewUI() {
  const previewSection = document.getElementById("previewSection");
  previewSection.innerHTML = "";
  if (currentMedia.img) {
    previewSection.innerHTML += `<div class="preview-wrapper"><img class="preview-img" src="${currentMedia.img}"><button class="btn-remove-media" onclick="removeMedia('img')">✕</button></div>`;
  }
  if (currentMedia.audio) {
    previewSection.innerHTML += `<div class="preview-wrapper"><audio controls src="${currentMedia.audio}"></audio><button class="btn-remove-media" onclick="removeMedia('audio')" style="top:-5px;">✕</button></div>`;
  }
}

/* =========================================
   5. Rendering, Deleting & UNDO Logic
   ========================================= */
function loadNotes() {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).index("order").openCursor(null, "prev").onsuccess = (e) => {
    const cursor = e.target.result;
    if (cursor) {
      const note = cursor.value;
      const card = document.createElement("div");
      card.className = "note-card";
      card.dataset.id = note.id;
      card.onclick = (event) => {
        // Prevent opening editor if clicking on Delete, Drag, Audio, OR CHECKBOX
        if(!event.target.closest('.btn-delete') && 
           !event.target.closest('.drag-handle') && 
           !event.target.classList.contains('task-checkbox') && 
           event.target.tagName !== 'AUDIO') {
          openEditor(note.id);
        }
      };
      
      let mediaHtml = "";
      if (note.img) mediaHtml += `<img class="note-img" src="${note.img}">`;
      if (note.audio) mediaHtml += `<audio controls src="${note.audio}"></audio>`;

      // Replaced standard text rendering with our new renderNoteText function
      card.innerHTML = `
        <div class="note-header">
          <span class="note-date">${note.date}</span>
          <div class="note-controls">
            <span class="drag-handle">↕️</span>
            <button class="btn-delete" onclick="deleteNote(event, ${note.id})">🗑️</button>
          </div>
        </div>
        ${note.text ? `<div class="note-text">${renderNoteText(note.text, note.id)}</div>` : ''}
        ${mediaHtml}
      `;
      setupTouchDrag(card); container.appendChild(card); cursor.continue();
    }
  };
}

// DELETE with UNDO feature
function deleteNote(event, id) {
  event.stopPropagation(); 
  
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  
  store.get(id).onsuccess = (e) => {
    lastDeletedNote = e.target.result;
    store.delete(id);
  };

  tx.oncomplete = () => {
    loadNotes();
    showUndoToast();
  };
}

function showUndoToast() {
  const snackbar = document.getElementById("snackbar");
  snackbar.classList.add("show");
  
  clearTimeout(undoTimeout);
  undoTimeout = setTimeout(() => {
    snackbar.classList.remove("show");
    lastDeletedNote = null; 
  }, 5000);
}

function undoDelete() {
  if (!lastDeletedNote) return;
  
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.add(lastDeletedNote); 
  
  tx.oncomplete = () => {
    loadNotes();
    document.getElementById("snackbar").classList.remove("show");
    lastDeletedNote = null;
    clearTimeout(undoTimeout);
  };
}

/* =========================================
   6. Drag & Drop Engine
   ========================================= */
let draggedElement = null;

function setupTouchDrag(card) {
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
  card.addEventListener('dragstart', (e) => { draggedElement = card; setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); card.removeAttribute('draggable'); saveNewOrder(); });
  handle.addEventListener('touchstart', (e) => { draggedElement = card; card.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  handle.addEventListener('touchmove', (e) => {
    if (!draggedElement) return; e.preventDefault();
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target ? target.closest('.note-card') : null;
    if (targetCard && targetCard !== draggedElement) {
      const container = document.getElementById("notes-container");
      const targetRect = targetCard.getBoundingClientRect();
      if (touch.clientY < targetRect.top + targetRect.height / 2) container.insertBefore(draggedElement, targetCard);
      else container.insertBefore(draggedElement, targetCard.nextSibling);
    }
  }, { passive: false });
  handle.addEventListener('touchend', () => { if (draggedElement) { draggedElement.classList.remove('dragging'); draggedElement = null; saveNewOrder(); } });
}

document.getElementById('notes-container').addEventListener('dragover', (e) => {
  e.preventDefault();
  const draggingCard = document.querySelector('.dragging');
  const cards = [...document.querySelectorAll('.note-card:not(.dragging)')];
  let nextCard = cards.find(card => e.clientY <= card.getBoundingClientRect().top + card.offsetHeight / 2);
  if (nextCard) document.getElementById('notes-container').insertBefore(draggingCard, nextCard);
  else document.getElementById('notes-container').appendChild(draggingCard);
});

function saveNewOrder() {
  const cards = document.querySelectorAll('.note-card');
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  let baseTime = Date.now();
  cards.forEach((card, index) => {
    const id = parseInt(card.dataset.id);
    store.get(id).onsuccess = (e) => { const note = e.target.result; if (note) { note.order = baseTime - index; store.put(note); } };
  });
}

/* =========================================
   7. Export / Import Functions
   ========================================= */
function exportNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
    const data = JSON.stringify(e.target.result);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `SmartNotes_Backup_${new Date().getTime()}.json`; a.click();
  };
}

document.getElementById("importInput").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (Array.isArray(importedData)) {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        importedData.forEach(note => { delete note.id; store.add(note); });
        tx.oncomplete = () => { alert("Imported Successfully!"); loadNotes(); };
      }
    } catch (err) { alert("Invalid backup file!"); }
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
