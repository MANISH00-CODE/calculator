<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes Pro V3</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --accent: #0ea5e9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); 
    color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; 
  }

  /* Top Header & Search */
  .top { 
    padding: 15px 15px 5px 15px; background: var(--bg-card); 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-row h2 { margin: 0; font-size: 20px; color: var(--accent); }
  .header-actions { display: flex; gap: 10px; }
  
  .btn-small { 
    background: var(--bg-input); color: var(--text-main); border: none; 
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; 
    font-family: 'Poppins', sans-serif; transition: 0.2s; font-weight: 600;
  }

  /* Smart Search Bar */
  .search-wrapper { position: relative; width: 100%; padding-bottom: 10px; }
  .search-input {
    width: 100%; padding: 10px 15px; background: var(--bg-main); border: 1px solid var(--bg-input); 
    border-radius: 8px; color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 13px;
    outline: none; box-sizing: border-box; transition: 0.3s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* Floating Add Button */
  .fab-add {
    position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px;
    background: var(--accent); color: white; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; z-index: 90;
  }

  /* Notes Grid/List */
  #notes-container { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
  
  .note-card {
    background: var(--bg-card); padding: 15px; border-radius: 12px; 
    border-left: 4px solid var(--accent); display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; touch-action: pan-y; 
  }
  .note-card.dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed var(--accent); }
  .note-header { display: flex; justify-content: space-between; align-items: center; }
  .note-date { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  
  .note-controls { display: flex; gap: 10px; align-items: center; }
  .drag-handle { cursor: grab; font-size: 18px; color: var(--text-muted); padding: 5px; }
  .btn-delete { 
    background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; 
    border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; 
    justify-content: center; font-size: 14px; cursor: pointer;
  }
  
  .note-text { font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
  
  /* Multiple Images Grid */
  .images-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
  .note-img { height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid var(--bg-input); }
  audio { width: 100%; height: 40px; margin-top: 5px; }

  /* Checkboxes */
  .task-checkbox { margin: 0 6px 0 0; vertical-align: middle; cursor: pointer; accent-color: var(--success); width: 16px; height: 16px; }
  .task-done { text-decoration: line-through; color: var(--text-muted); transition: 0.2s; }

  /* Full Page Editor Overlay */
  .editor-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-main); z-index: 200; display: none; flex-direction: column;
  }
  .editor-overlay.active { display: flex; }

  .editor-header {
    padding: 10px 15px; background: var(--bg-card); display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .editor-top-row { display: flex; justify-content: space-between; align-items: center; }
  .btn-close-editor { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  
  /* In-Editor Search */
  .editor-search {
    width: 100%; padding: 8px 12px; background: var(--bg-main); border: 1px solid var(--bg-input);
    border-radius: 6px; color: var(--text-main); font-size: 12px; font-family: 'Poppins', sans-serif; outline: none;
  }

  .editor-body { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
  
  .rich-input-container {
    position: relative; background: var(--bg-card); border-radius: 12px;
    border: 2px solid var(--bg-input); display: flex; flex-direction: column; min-height: 300px;
  }
  .rich-input-container:focus-within { border-color: var(--accent); }
  
  textarea {
    flex: 1; width: 100%; padding: 15px; background: transparent; border: none;
    color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 15px;
    resize: none; outline: none; box-sizing: border-box; line-height: 1.5;
  }

  .inline-toolbar {
    display: flex; gap: 12px; padding: 10px 15px; background: rgba(0, 0, 0, 0.2);
    border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; align-items: center;
  }
  .media-btn {
    background: var(--bg-input); color: var(--text-main); border: none; width: 36px; height: 36px; 
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s;
  }
  .media-btn:active { transform: scale(0.9); }
  .media-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* Editor Preview Section */
  .preview-section { display: flex; flex-wrap: wrap; gap: 10px; }
  .preview-wrapper { position: relative; }
  .preview-img { height: 100px; border-radius: 8px; border: 1px solid var(--accent); object-fit: cover; }
  .btn-remove-media {
    position: absolute; top: -5px; right: -5px; background: var(--danger); color: white;
    border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 10px;
  }
  .audio-wrapper { width: 100%; position: relative; margin-top: 10px; }

  /* Undo Snackbar */
  #snackbar {
    visibility: hidden; min-width: 250px; background-color: var(--bg-input); color: #fff;
    text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed;
    z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); display: flex;
    justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s, bottom 0.3s; font-size: 14px; border: 1px solid var(--accent);
  }
  #snackbar.show { visibility: visible; opacity: 1; bottom: 90px; }
  .undo-btn { color: var(--accent); font-weight: bold; cursor: pointer; border: none; background: none; margin-left: 15px; font-family: inherit; font-size: 14px; padding: 5px 10px; border-radius: 6px; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 100; }
  .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; transition: 0.2s; }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  .action-fab { background: var(--accent); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; text-decoration: none; margin-top: -20px; }
</style>
</head>
<body>

<input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
<input type="file" id="importInput" accept=".json" style="display: none;">

<div class="top">
  <div class="header-row">
    <h2>📝 Smart Notes</h2>
    <div class="header-actions">
      <button class="btn-small" onclick="exportNotes()">📤 Export</button>
      <button class="btn-small" onclick="document.getElementById('importInput').click()">📥 Import</button>
    </div>
  </div>
  <div class="search-wrapper">
    <input type="search" id="globalSearch" class="search-input" list="wordSuggestions" placeholder="🔍 Search in notes..." oninput="filterNotes()">
    <datalist id="wordSuggestions"></datalist>
  </div>
</div>

<div id="notes-container"></div>

<div class="fab-add" onclick="openEditor()">➕</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-header">
    <div class="editor-top-row">
      <span style="font-weight: 600; font-size: 16px;">Edit Note</span>
      <button class="btn-close-editor" onclick="closeEditor()">✕ Save & Close</button>
    </div>
    <input type="text" id="editorSearch" class="editor-search" placeholder="🔍 Find word in this note..." oninput="findInEditor()">
  </div>
  
  <div class="editor-body">
    <div class="rich-input-container">
      <textarea id="noteText" placeholder="Start typing your note here..."></textarea>
      <div class="inline-toolbar">
        <button class="media-btn" title="Add Photo" onclick="document.getElementById('imageInput').click()">📷</button>
        <button class="media-btn" id="inlineVoiceBtn" title="Record Voice" onclick="toggleRecording()">🎙️</button>
        <button class="media-btn" title="Add Checkbox" onclick="insertCheckbox()">☑️</button>
        <span id="recordingStatus" style="font-size: 12px; color: var(--text-muted);"></span>
      </div>
    </div>
    <div class="preview-section" id="previewSection"></div>
  </div>
</div>

<div id="snackbar">
  <span>Note deleted</span>
  <button class="undo-btn" onclick="undoDelete()">UNDO</button>
</div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  <a href="index.html" class="action-fab">🧮</a>
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

<script>
/* =========================================
   1. IndexedDB Engine Setup
   ========================================= */
const DB_NAME = "ProSmartNotesV4";
const STORE_NAME = "notes_multimedia";
let db;
let currentEditingId = null; 
// Naya System: Ab 'images' ek Array hai
let currentMedia = { images: [], audio: null };
let allNotesCache = []; // For fast global searching

let lastDeletedNote = null;
let undoTimeout = null;

const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains(STORE_NAME)) {
    const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    store.createIndex("order", "order", { unique: false });
  }
};
request.onsuccess = (e) => { db = e.target.result; loadNotes(); };

function getFormattedDate() {
  const d = new Date();
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${d.getDate()} ${months[d.getMonth()]}, ${d.getFullYear()} | ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
}

/* =========================================
   2. Smart Global Search & Auto-Suggest
   ========================================= */
function updateWordSuggestions() {
  let words = new Set();
  allNotesCache.forEach(note => {
    if (note.text) {
      // Find all words, removing special chars
      let matchedWords = note.text.toLowerCase().match(/[a-z0-9\u0900-\u097F]+/g);
      if (matchedWords) matchedWords.forEach(w => { if(w.length > 2) words.add(w) });
    }
  });

  const datalist = document.getElementById("wordSuggestions");
  datalist.innerHTML = "";
  words.forEach(w => { datalist.innerHTML += `<option value="${w}">`; });
}

function filterNotes() {
  const query = document.getElementById("globalSearch").value.toLowerCase().trim();
  
  // Sort Logic: Match wale top par aayenge
  let sortedNotes = [...allNotesCache].sort((a, b) => {
    let aMatch = (a.text && a.text.toLowerCase().includes(query)) ? 1 : 0;
    let bMatch = (b.text && b.text.toLowerCase().includes(query)) ? 1 : 0;
    
    // Agar dono match karte hain ya dono nahi karte, toh original date (order) se sort rahenge
    if (aMatch === bMatch) return b.order - a.order;
    return bMatch - aMatch; // Jo match karega wo oopar (1 > 0)
  });

  // Agar query empty hai toh normal sort
  if (!query) sortedNotes = [...allNotesCache].sort((a, b) => b.order - a.order);

  renderNotesList(sortedNotes);
}

/* =========================================
   3. Editor Logic & In-Editor Find
   ========================================= */
function openEditor(noteId = null) {
  currentEditingId = noteId;
  currentMedia = { images: [], audio: null };
  document.getElementById("noteText").value = "";
  document.getElementById("editorSearch").value = "";
  document.getElementById("previewSection").innerHTML = "";
  
  if (noteId) {
    const tx = db.transaction(STORE_NAME, "readonly");
    tx.objectStore(STORE_NAME).get(noteId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        document.getElementById("noteText").value = note.text || "";
        // Handle legacy single image backward compatibility
        if(note.images) currentMedia.images = note.images;
        else if (note.img) currentMedia.images = [note.img]; 
        
        currentMedia.audio = note.audio;
        updatePreviewUI();
      }
    };
  }
  document.getElementById("editorOverlay").classList.add("active");
  history.pushState({ isEditing: true }, "");
}

// VS Code style In-Editor Find
function findInEditor() {
  const query = document.getElementById("editorSearch").value.toLowerCase();
  const textarea = document.getElementById("noteText");
  const text = textarea.value.toLowerCase();
  
  if (!query) return;

  const index = text.indexOf(query);
  if (index !== -1) {
    textarea.focus();
    textarea.setSelectionRange(index, index + query.length);
  }
}

window.addEventListener('popstate', function (event) {
  if (document.getElementById("editorOverlay").classList.contains("active")) closeEditor(false); 
});

function closeEditor(shouldPopHistory = true) {
  autoSaveCurrentNote();
  document.getElementById("editorOverlay").classList.remove("active");
  if (shouldPopHistory && history.state && history.state.isEditing) history.back();
}

function autoSaveCurrentNote() {
  const text = document.getElementById("noteText").value.trim();
  if (!text && currentMedia.images.length === 0 && !currentMedia.audio) return;

  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);

  if (currentEditingId) {
    store.get(currentEditingId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        note.text = text; 
        note.images = currentMedia.images; 
        note.audio = currentMedia.audio;
        store.put(note);
      }
    };
  } else {
    store.add({ 
      text: text, images: currentMedia.images, audio: currentMedia.audio, 
      date: getFormattedDate(), order: Date.now() 
    });
  }
  tx.oncomplete = () => loadNotes();
}

/* =========================================
   4. Checkbox Logic
   ========================================= */
function insertCheckbox() {
  const textarea = document.getElementById("noteText");
  const startPos = textarea.selectionStart;
  const text = textarea.value;
  textarea.value = text.substring(0, startPos) + "☐ " + text.substring(textarea.selectionEnd, text.length);
  textarea.selectionStart = textarea.selectionEnd = startPos + 2;
  textarea.focus();
}

function renderNoteText(text, noteId) {
  if (!text) return '';
  let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  let checkboxIndex = 0;
  return escaped.replace(/(☐|☑)(.*?)(?=\n|$)/g, (match, box, content) => {
    let isChecked = box === '☑';
    let idx = checkboxIndex++;
    return `<input type="checkbox" class="task-checkbox" ${isChecked ? 'checked' : ''} onclick="toggleTask(event, ${noteId}, ${idx})"><span ${isChecked ? 'class="task-done"' : ''}>${content}</span>`;
  });
}

window.toggleTask = function(event, noteId, taskIndex) {
  event.stopPropagation(); 
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.get(noteId).onsuccess = (e) => {
    const note = e.target.result;
    if (note && note.text) {
      let currentIdx = 0;
      note.text = note.text.replace(/(☐|☑)/g, (match) => {
        if (currentIdx === taskIndex) { currentIdx++; return match === '☐' ? '☑' : '☐'; }
        currentIdx++; return match;
      });
      store.put(note);
    }
  };
  tx.oncomplete = () => loadNotes(); 
};

/* =========================================
   5. Media Management (MULTIPLE IMAGES)
   ========================================= */
document.getElementById("imageInput").addEventListener("change", function(e) {
  const files = e.target.files;
  if (!files || files.length === 0) return;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 800;
        let width = img.width, height = img.height;
        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        
        // Push compressed image to Array
        currentMedia.images.push(canvas.toDataURL("image/jpeg", 0.7)); 
        updatePreviewUI();
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });
});

let mediaRecorder; let audioChunks = []; let isRecording = false;

async function toggleRecording() {
  const btn = document.getElementById("inlineVoiceBtn");
  const status = document.getElementById("recordingStatus");
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => { currentMedia.audio = reader.result; updatePreviewUI(); };
        reader.readAsDataURL(audioBlob);
      };
      mediaRecorder.start();
      isRecording = true;
      btn.innerHTML = "⏹️"; btn.classList.add("recording"); status.innerText = "Recording...";
    } catch (err) { alert("Microphone permission denied!"); }
  } else {
    mediaRecorder.stop(); isRecording = false;
    btn.innerHTML = "🎙️"; btn.classList.remove("recording"); status.innerText = "";
  }
}

function removeImage(index) { currentMedia.images.splice(index, 1); updatePreviewUI(); }
function removeAudio() { currentMedia.audio = null; updatePreviewUI(); }

function updatePreviewUI() {
  const previewSection = document.getElementById("previewSection");
  previewSection.innerHTML = "";
  
  // Render Multiple Images
  currentMedia.images.forEach((imgData, index) => {
    previewSection.innerHTML += `
      <div class="preview-wrapper">
        <img class="preview-img" src="${imgData}">
        <button class="btn-remove-media" onclick="removeImage(${index})">✕</button>
      </div>`;
  });

  // Render Audio
  if (currentMedia.audio) {
    previewSection.innerHTML += `
      <div class="audio-wrapper">
        <audio controls src="${currentMedia.audio}"></audio>
        <button class="btn-remove-media" onclick="removeAudio()" style="top:-10px;">✕</button>
      </div>`;
  }
}

/* =========================================
   6. Rendering & Deleting Logic
   ========================================= */
function loadNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  allNotesCache = [];
  
  tx.objectStore(STORE_NAME).index("order").openCursor(null, "prev").onsuccess = (e) => {
    const cursor = e.target.result;
    if (cursor) {
      allNotesCache.push(cursor.value);
      cursor.continue();
    } else {
      updateWordSuggestions(); // Update dictionary for auto-suggest
      filterNotes(); // Initial render handles sort
    }
  };
}

function renderNotesList(notesArray) {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  
  if(notesArray.length === 0) {
     container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-size: 13px;">No matching notes found.</div>`;
     return;
  }

  notesArray.forEach(note => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.dataset.id = note.id;
    card.onclick = (event) => {
      if(!event.target.closest('.btn-delete') && !event.target.closest('.drag-handle') && 
         !event.target.classList.contains('task-checkbox') && event.target.tagName !== 'AUDIO' && event.target.tagName !== 'IMG') {
        openEditor(note.id);
      }
    };
    
    // Support legacy 'img' or new 'images' array
    let imagesArr = note.images ? note.images : (note.img ? [note.img] : []);
    let imgHtml = "";
    if (imagesArr.length > 0) {
      imgHtml = `<div class="images-grid">` + imagesArr.map(img => `<img class="note-img" src="${img}">`).join('') + `</div>`;
    }
    
    let audioHtml = note.audio ? `<audio controls src="${note.audio}"></audio>` : "";

    card.innerHTML = `
      <div class="note-header">
        <span class="note-date">${note.date}</span>
        <div class="note-controls">
          <span class="drag-handle">↕️</span>
          <button class="btn-delete" onclick="deleteNote(event, ${note.id})">🗑️</button>
        </div>
      </div>
      ${note.text ? `<div class="note-text">${renderNoteText(note.text, note.id)}</div>` : ''}
      ${imgHtml}
      ${audioHtml}
    `;
    setupTouchDrag(card); 
    container.appendChild(card);
  });
}

function deleteNote(event, id) {
  event.stopPropagation(); 
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.get(id).onsuccess = (e) => { lastDeletedNote = e.target.result; store.delete(id); };
  tx.oncomplete = () => { loadNotes(); showUndoToast(); };
}

function showUndoToast() {
  const snackbar = document.getElementById("snackbar");
  snackbar.classList.add("show");
  clearTimeout(undoTimeout);
  undoTimeout = setTimeout(() => { snackbar.classList.remove("show"); lastDeletedNote = null; }, 5000);
}

function undoDelete() {
  if (!lastDeletedNote) return;
  const tx = db.transaction(STORE_NAME, "readwrite");
  tx.objectStore(STORE_NAME).add(lastDeletedNote); 
  tx.oncomplete = () => { loadNotes(); document.getElementById("snackbar").classList.remove("show"); lastDeletedNote = null; clearTimeout(undoTimeout); };
}

/* =========================================
   7. Drag & Drop & Export
   ========================================= */
let draggedElement = null;
function setupTouchDrag(card) {
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
  card.addEventListener('dragstart', (e) => { draggedElement = card; setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); card.removeAttribute('draggable'); saveNewOrder(); });
  handle.addEventListener('touchstart', (e) => { draggedElement = card; card.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  handle.addEventListener('touchmove', (e) => {
    if (!draggedElement) return; e.preventDefault();
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target ? target.closest('.note-card') : null;
    if (targetCard && targetCard !== draggedElement) {
      const container = document.getElementById("notes-container");
      const targetRect = targetCard.getBoundingClientRect();
      if (touch.clientY < targetRect.top + targetRect.height / 2) container.insertBefore(draggedElement, targetCard);
      else container.insertBefore(draggedElement, targetCard.nextSibling);
    }
  }, { passive: false });
  handle.addEventListener('touchend', () => { if (draggedElement) { draggedElement.classList.remove('dragging'); draggedElement = null; saveNewOrder(); } });
}

function saveNewOrder() {
  // Only save order if search is empty (to prevent messing up order when filtered)
  if(document.getElementById("globalSearch").value) return; 

  const cards = document.querySelectorAll('.note-card');
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  let baseTime = Date.now();
  cards.forEach((card, index) => {
    const id = parseInt(card.dataset.id);
    store.get(id).onsuccess = (e) => { const note = e.target.result; if (note) { note.order = baseTime - index; store.put(note); } };
  });
  tx.oncomplete = () => loadNotes(); // Reload pure order
}

function exportNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
    const data = JSON.stringify(e.target.result);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `SmartNotes_Backup_${new Date().getTime()}.json`; a.click();
  };
}

document.getElementById("importInput").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (Array.isArray(importedData)) {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        importedData.forEach(note => { delete note.id; store.add(note); });
        tx.oncomplete = () => { alert("Imported Successfully!"); loadNotes(); };
      }
    } catch (err) { alert("Invalid backup file!"); }
  };
  reader.readAsText(file);
});
</script>
