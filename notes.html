<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes Pro V7</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.error('Offline Error:', err));
    });
  }
</script>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --accent: #0ea5e9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); 
    color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; 
  }

  /* Top Header */
  .top { 
    padding: 15px 15px 5px 15px; background: var(--bg-card); 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-row h2 { margin: 0; font-size: 20px; color: var(--accent); }
  .header-actions { display: flex; gap: 10px; }
  
  .btn-small { 
    background: var(--bg-input); color: var(--text-main); border: none; 
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; 
    font-family: 'Poppins', sans-serif; transition: 0.2s; font-weight: 600; display: flex; align-items: center; gap: 4px;
  }

  /* Search */
  .search-wrapper { position: relative; width: 100%; padding-bottom: 10px; }
  .search-input {
    width: 100%; padding: 10px 15px; background: var(--bg-main); border: 1px solid var(--bg-input); 
    border-radius: 8px; color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 13px;
    outline: none; box-sizing: border-box; transition: 0.3s;
  }
  .search-input:focus { border-color: var(--accent); }

  .fab-add {
    position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px;
    background: var(--accent); color: white; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; z-index: 90;
  }

  /* Notes Container */
  #notes-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  
  .note-card {
    background: var(--bg-card); padding: 10px 12px; border-radius: 12px; 
    border-left: 4px solid var(--accent); display: flex; flex-direction: row; 
    align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); touch-action: pan-y; 
  }
  .note-card.dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed var(--accent); }
  
  /* Overlays */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-main); z-index: 200; display: none; flex-direction: column;
  }
  .overlay.active { display: flex; }

  .overlay-header {
    padding: 10px 15px; background: var(--bg-card); display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-wrap: wrap; gap: 10px;
  }
  .overlay-header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-close { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  
  .overlay-body { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; scroll-behavior: smooth; }
  
  /* Fixed Size Editor Container */
  .rich-input-container {
    background: var(--bg-card); border-radius: 12px; border: 2px solid var(--bg-input); 
    display: flex; flex-direction: column; height: 400px; min-height: 400px; max-height: 400px; 
  }
  .rich-input-container:focus-within { border-color: var(--accent); }

  #blocksContainer { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
  
  /* Task Row Structure */
  .task-row {
    display: flex; align-items: flex-start; gap: 8px; background: var(--bg-main); 
    padding: 10px; border-radius: 8px; position: relative; transition: background 0.3s;
  }
  .task-row.dragging-row { opacity: 0.5; border: 1px dashed var(--accent); }
  
  .drag-handle { cursor: grab; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; padding-top: 2px; }
  .row-num { font-weight: bold; font-size: 14px; color: var(--accent); padding-top: 2px; min-width: 18px; }
  .task-check { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; margin-top: 4px; }
  
  .row-content { 
    flex: 1; outline: none; min-height: 24px; font-size: 15px; color: var(--text-main);
    word-wrap: break-word; white-space: pre-wrap; padding-top: 1px;
  }
  
  /* Top & Delete Buttons in Row */
  .row-top { background: none; border: none; color: var(--success); font-size: 18px; cursor: pointer; padding: 0 2px; }
  .row-del { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 0 2px; }

  /* Toolbars */
  .inline-toolbar {
    display: flex; gap: 10px; padding: 10px 15px; background: rgba(0, 0, 0, 0.2);
    border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; align-items: center; flex-shrink: 0;
  }
  .media-btn {
    background: var(--bg-input); color: var(--text-main); border: none; width: 34px; height: 34px; 
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer;
  }
  .media-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* Snackbar */
  #snackbar {
    visibility: hidden; min-width: 250px; background-color: var(--bg-input); color: #fff;
    text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed;
    z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); display: flex;
    justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s, bottom 0.3s; font-size: 14px; border: 1px solid var(--accent);
  }
  #snackbar.show { visibility: visible; opacity: 1; bottom: 90px; }
  .undo-btn { color: var(--accent); font-weight: bold; cursor: pointer; border: none; background: none; margin-left: 15px; font-family: inherit; font-size: 14px; padding: 5px 10px; border-radius: 6px; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 100; }
  .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  .action-fab { background: var(--accent); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -20px; text-decoration: none; }
</style>
</head>
<body>

<input type="file" id="inlineImageInput" accept="image/*" style="display: none;">
<input type="file" id="importInput" accept=".json" style="display: none;">

<!-- Main App Screen -->
<div class="top">
  <div class="header-row">
    <h2>📝 Smart Notes</h2>
    <div class="header-actions">
      <button class="btn-small" onclick="exportNotes()">📤</button>
      <button class="btn-small" onclick="document.getElementById('importInput').click()">📥</button>
    </div>
  </div>
  <div class="search-wrapper">
    <input type="search" id="globalSearch" class="search-input" list="wordSuggestions" placeholder="🔍 Search in notes..." oninput="filterNotes()">
    <datalist id="wordSuggestions"></datalist>
  </div>
</div>

<div id="notes-container"></div>
<div class="fab-add" onclick="openEditor()">➕</div>

<!-- PREVIEW OVERLAY -->
<div class="overlay" id="previewOverlay">
  <div class="overlay-header">
    <span style="font-weight: 600; font-size: 16px;">View Note</span>
    <div class="overlay-header-actions">
      <button class="btn-small" style="background: rgba(16, 185, 129, 0.1); color: var(--success);" onclick="document.getElementById('previewBody').scrollTop = 0">⬆️ Top</button>
      <button class="btn-small" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);" onclick="deleteFromPreview()">🗑️ Del</button>
      <button class="btn-close" onclick="closePreview()">✖ Back</button>
    </div>
  </div>
  <div class="overlay-body" id="previewBody">
    <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 5px;" id="previewDate"></div>
    <!-- Organized Content goes here -->
    <div id="previewContent" style="display: flex; flex-direction: column; gap: 15px;"></div>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div class="overlay" id="editorOverlay">
  <div class="overlay-header">
    <span style="font-weight: 600; font-size: 16px;">Edit Note</span>
    <button class="btn-close" onclick="closeEditor()">💾 Save & Close</button>
  </div>
  
  <div class="overlay-body">
    <div class="rich-input-container">
      <div id="blocksContainer"></div>
      
      <!-- Toolbar with Simple Note & Checkbox -->
      <div class="inline-toolbar">
        <button class="media-btn" title="Add Simple Note" onclick="addRow('note')">📝</button>
        <button class="media-btn" title="Add Checkbox" onclick="addRow('check')">☑️</button>
        <button class="media-btn" id="inlineVoiceBtn" title="Record Voice" onclick="toggleRecording()">🎙️</button>
        <span style="font-size: 10px; color: var(--text-muted); margin-left: 5px; line-height: 1.2;">Click text & Hold<br>for image 🖼️</span>
      </div>
    </div>
  </div>
</div>

<div id="snackbar">
  <span id="snackbarMsg">Action</span>
  <button class="undo-btn" id="undoBtn" onclick="undoDelete()">UNDO</button>
</div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  <a href="index.html" class="action-fab">🧮</a>
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

<script>
/* ================= DB Setup ================= */
const DB_NAME = "ProSmartNotesV7";
const STORE_NAME = "notes_multimedia";
let db;
let currentActiveId = null; 
let allNotesCache = []; 
let lastDeletedNote = null;
let undoTimeout = null;

const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains(STORE_NAME)) {
    const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    store.createIndex("order", "order", { unique: false });
  }
};
request.onsuccess = (e) => { db = e.target.result; loadNotes(); };

function getFormattedDate() {
  const d = new Date();
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} | ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
}

function showSnackbar(msg, showUndo = false) {
  const snackbar = document.getElementById("snackbar");
  document.getElementById("snackbarMsg").innerText = msg;
  document.getElementById("undoBtn").style.display = showUndo ? "block" : "none";
  snackbar.classList.add("show");
  clearTimeout(undoTimeout);
  undoTimeout = setTimeout(() => { snackbar.classList.remove("show"); if(showUndo) lastDeletedNote = null; }, 5000);
}

function generateRowId() {
  return 'row_' + Date.now() + Math.random().toString(36).substr(2, 5);
}

/* ================= List Rendering ================= */
function filterNotes() {
  const query = document.getElementById("globalSearch").value.toLowerCase().trim();
  let sortedNotes = [...allNotesCache].sort((a, b) => b.order - a.order);
  if (query) {
    sortedNotes = sortedNotes.filter(note => {
      let t = (note.text || "").toLowerCase();
      return t.includes(query);
    });
  }
  renderNotesList(sortedNotes);
}

function updateWordSuggestions() {
  let words = new Set();
  allNotesCache.forEach(note => {
    let t = (note.text || "").replace(/<[^>]+>/g, ' ').toLowerCase();
    let matchedWords = t.match(/[a-z0-9\u0900-\u097F]+/g);
    if (matchedWords) matchedWords.forEach(w => { if(w.length > 2) words.add(w) });
  });
  const datalist = document.getElementById("wordSuggestions");
  datalist.innerHTML = "";
  words.forEach(w => { datalist.innerHTML += `<option value="${w}">`; });
}

function loadNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  allNotesCache = [];
  tx.objectStore(STORE_NAME).index("order").openCursor(null, "prev").onsuccess = (e) => {
    const cursor = e.target.result;
    if (cursor) { allNotesCache.push(cursor.value); cursor.continue(); } 
    else { updateWordSuggestions(); filterNotes(); }
  };
}

function renderNotesList(notesArray) {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  if(notesArray.length === 0) {
     container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-size: 13px;">No matching notes found.</div>`; return;
  }
  notesArray.forEach((note, index) => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.dataset.id = note.id;
    
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = note.text || "";
    let firstRowContent = tempDiv.querySelector('.row-content');
    let cleanText = firstRowContent ? firstRowContent.innerText.trim() : tempDiv.innerText.trim();
    let firstLine = cleanText.split('\n')[0].substring(0, 50);
    
    let hasAudio = tempDiv.querySelector('audio') !== null;
    let previewContent = firstLine ? `<span style="font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">${firstLine}</span>` 
                                   : (hasAudio ? `<span style="font-size: 12px; color: var(--accent);">🎵 Audio Attached</span>` : `<span style="font-size: 12px; color: var(--text-muted);">Empty Note</span>`);

    card.innerHTML = `
      <span class="drag-handle" style="cursor: grab; font-size: 18px; color: var(--text-muted); padding: 5px; flex-shrink: 0;">↕️</span>
      <span style="font-size: 14px; font-weight: bold; color: var(--accent); min-width: 22px; flex-shrink: 0; text-align: center;">${index + 1}.</span>
      <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; cursor: pointer;" onclick="openPreview(${note.id})">
         <span style="font-size: 10px; color: var(--text-muted); margin-bottom: 2px;">${note.date}</span>
         ${previewContent}
      </div>
      <button class="btn-delete" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; flex-shrink: 0;" onclick="deleteNoteFromList(event, ${note.id})">✖</button>
    `;
    setupMainListTouchDrag(card); container.appendChild(card);
  });
}

function deleteNoteFromList(event, id) {
  event.stopPropagation(); 
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.get(id).onsuccess = (e) => { lastDeletedNote = e.target.result; store.delete(id); };
  tx.oncomplete = () => { loadNotes(); showSnackbar("Note Deleted", true); };
}
function undoDelete() {
  if (!lastDeletedNote) return;
  const tx = db.transaction(STORE_NAME, "readwrite");
  tx.objectStore(STORE_NAME).add(lastDeletedNote); 
  tx.oncomplete = () => { loadNotes(); document.getElementById("snackbar").classList.remove("show"); lastDeletedNote = null; clearTimeout(undoTimeout); };
}

/* ================= Drag & Drop (Main List) ================= */
let draggedListElement = null;
function setupMainListTouchDrag(card) {
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('touchstart', (e) => { draggedListElement = card; card.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  handle.addEventListener('touchmove', (e) => {
    if (!draggedListElement) return; e.preventDefault();
    const touch = e.touches[0];
    const container = document.getElementById("notes-container");
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target ? target.closest('.note-card') : null;
    if (targetCard && targetCard !== draggedListElement) {
      const targetRect = targetCard.getBoundingClientRect();
      if (touch.clientY < targetRect.top + targetRect.height / 2) container.insertBefore(draggedListElement, targetCard);
      else container.insertBefore(draggedListElement, targetCard.nextSibling);
    }
  }, { passive: false });
  handle.addEventListener('touchend', () => { if (draggedListElement) { draggedListElement.classList.remove('dragging'); draggedListElement = null; saveMainListOrder(); } });
}
function saveMainListOrder() {
  if(document.getElementById("globalSearch").value) return; 
  const cards = document.querySelectorAll('.note-card');
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  let baseTime = Date.now();
  cards.forEach((card, index) => {
    const id = parseInt(card.dataset.id);
    store.get(id).onsuccess = (e) => { const note = e.target.result; if (note) { note.order = baseTime - index; store.put(note); } };
  });
  tx.oncomplete = () => loadNotes();
}

/* ================= View Note (Preview & Groups) ================= */
function openPreview(id) {
  currentActiveId = id;
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).get(id).onsuccess = (e) => {
    const note = e.target.result;
    if (note) {
      document.getElementById("previewDate").innerText = note.date;
      
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = note.text || "";
      
      let notesHtml = `<div style="background:var(--bg-card); padding:10px; border-radius:10px;"><h3 style="margin:0 0 10px 0; color:var(--accent); font-size:16px;">📝 Notes</h3>`;
      let checksHtml = `<div style="background:var(--bg-card); padding:10px; border-radius:10px;"><h3 style="margin:0 0 10px 0; color:var(--success); font-size:16px;">☑️ Tasks</h3>`;
      let noteNum = 1, checkNum = 1;
      let hasNotes = false, hasChecks = false;

      tempDiv.querySelectorAll('.task-row').forEach(row => {
        if(!row.id) row.id = generateRowId(); // Retrofit ID if missing
        
        let isCheck = row.querySelector('.task-check') !== null;
        let contentHtml = row.querySelector('.row-content').innerHTML;
        let isChecked = isCheck && row.querySelector('.task-check').checked;
        
        let textStyle = isChecked ? 'text-decoration: line-through; opacity: 0.6;' : '';
        let checkInput = isCheck ? `<input type="checkbox" ${isChecked?'checked':''} onchange="togglePreviewCheck(this, ${note.id}, '${row.id}')" style="width:18px; height:18px; accent-color:var(--success); margin-top:2px;">` : '';

        // Direct Line Editing Button (✏️ Edit)
        let rowHtml = `
          <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:12px;">
            <span style="font-weight:bold; color:var(--text-muted); min-width:20px; text-align:right;">${isCheck ? checkNum++ : noteNum++}.</span>
            ${checkInput}
            <div style="flex:1; font-size:15px; color:var(--text-main); ${textStyle}">${contentHtml}</div>
            <button onclick="switchToEditRow(${note.id}, '${row.id}')" style="background:rgba(14,165,233,0.1); border:none; border-radius:6px; padding:4px 8px; cursor:pointer; color:var(--accent); font-size:12px; font-weight:600;">✏️ Edit</button>
          </div>
        `;

        if(isCheck) { checksHtml += rowHtml; hasChecks = true; }
        else { notesHtml += rowHtml; hasNotes = true; }
      });

      notesHtml += `</div>`;
      checksHtml += `</div>`;

      let finalHtml = "";
      if(hasNotes) finalHtml += notesHtml;
      if(hasChecks) finalHtml += checksHtml;
      
      document.getElementById("previewContent").innerHTML = finalHtml || "<div style='text-align:center; color:var(--text-muted);'>Empty Note</div>";
      document.getElementById("previewOverlay").classList.add("active");
      history.pushState({ isPreview: true }, "");
    }
  };
}

function closePreview(popHistory = true) {
  document.getElementById("previewOverlay").classList.remove("active");
  currentActiveId = null;
  loadNotes(); 
  if (popHistory && history.state && history.state.isPreview) history.back();
}

function deleteFromPreview() {
  if(currentActiveId) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.get(currentActiveId).onsuccess = (e) => { lastDeletedNote = e.target.result; store.delete(currentActiveId); };
    tx.oncomplete = () => { closePreview(); showSnackbar("Note Deleted", true); };
  }
}

function switchToEditRow(noteId, rowId) {
  closePreview(false); // Close preview without popping history
  openEditor(noteId, rowId);
}

// Tick checkbox from Preview directly updates DB
window.togglePreviewCheck = function(chk, noteId, rowId) {
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.get(noteId).onsuccess = (e) => {
    const note = e.target.result;
    if (note) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = note.text;
      const targetRow = tempDiv.querySelector(`#${rowId}`);
      if(targetRow) {
         let targetCheck = targetRow.querySelector('.task-check');
         if(targetCheck) {
            if(chk.checked) targetCheck.setAttribute('checked', 'checked');
            else targetCheck.removeAttribute('checked');
            note.text = tempDiv.innerHTML;
            store.put(note);
            // Apply visual strike-through instantly on preview screen
            let contentDiv = chk.nextElementSibling;
            if(chk.checked) { contentDiv.style.textDecoration = 'line-through'; contentDiv.style.opacity = '0.6'; }
            else { contentDiv.style.textDecoration = 'none'; contentDiv.style.opacity = '1'; }
         }
      }
    }
  };
};

/* ================= Editor Mode ================= */
function updateRowNumbers(containerId) {
  const rows = document.querySelectorAll(`#${containerId} .task-row`);
  rows.forEach((row, index) => {
    const numEl = row.querySelector('.row-num');
    if(numEl) numEl.innerText = (index + 1) + ".";
  });
}

function moveRowTop(btn) {
  const row = btn.closest('.task-row');
  const container = document.getElementById("blocksContainer");
  container.insertBefore(row, container.firstChild);
  updateRowNumbers('blocksContainer');
  row.style.background = 'rgba(16, 185, 129, 0.2)';
  setTimeout(() => row.style.background = 'var(--bg-main)', 800);
}

function deleteRow(btn) {
  btn.closest('.task-row').remove();
  updateRowNumbers('blocksContainer');
}

// Type can be 'note' or 'check'
function addRow(type = 'note', focus = true) {
  const container = document.getElementById("blocksContainer");
  const rowId = generateRowId();
  const row = document.createElement("div");
  row.className = "task-row";
  row.id = rowId;
  
  let checkHtml = type === 'check' ? `<input type="checkbox" class="task-check" onchange="toggleEditCheck(this)">` : ``;
  
  row.innerHTML = `
    <span class="drag-handle">↕️</span>
    <span class="row-num"></span>
    ${checkHtml}
    <div class="row-content" contenteditable="true" placeholder="${type==='check' ? 'Task...' : 'Note...'}"></div>
    <button class="row-top" onclick="moveRowTop(this)">⬆️</button>
    <button class="row-del" onclick="deleteRow(this)">✖</button>
  `;
  container.appendChild(row);
  updateRowNumbers('blocksContainer');
  if(focus) row.querySelector('.row-content').focus();
}

window.toggleEditCheck = function(chk) {
  const content = chk.closest('.task-row').querySelector('.row-content');
  if(chk.checked) {
    content.style.textDecoration = 'line-through'; content.style.opacity = '0.6';
    chk.setAttribute('checked', 'checked');
  } else {
    content.style.textDecoration = 'none'; content.style.opacity = '1';
    chk.removeAttribute('checked');
  }
};

function openEditor(noteId = null, targetRowId = null) {
  currentActiveId = noteId;
  const blocksContainer = document.getElementById("blocksContainer");
  blocksContainer.innerHTML = "";
  
  if (noteId) {
    const tx = db.transaction(STORE_NAME, "readonly");
    tx.objectStore(STORE_NAME).get(noteId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        blocksContainer.innerHTML = note.text || "";
        
        // Add ID if missing
        blocksContainer.querySelectorAll('.task-row').forEach(row => {
           if(!row.id) row.id = generateRowId();
        });

        // Scroll to specific row if clicked from Edit in Preview
        if(targetRowId) {
           setTimeout(() => {
              let target = document.getElementById(targetRowId);
              if(target) {
                 target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                 target.querySelector('.row-content').focus();
                 target.style.background = 'rgba(14, 165, 233, 0.2)';
                 setTimeout(() => target.style.background = 'var(--bg-main)', 1000);
              }
           }, 200);
        }
      }
    };
  } else {
    addRow('note', true); // Default simple note row
  }
  
  document.getElementById("editorOverlay").classList.add("active");
  history.pushState({ isEditing: true }, "");
}

function closeEditor(shouldPopHistory = true) {
  const blocksContainer = document.getElementById("blocksContainer");
  // Clean empty rows
  blocksContainer.querySelectorAll('.task-row').forEach(row => {
     let content = row.querySelector('.row-content');
     if(content.innerText.trim() === "" && content.innerHTML.indexOf('<img') === -1 && content.innerHTML.indexOf('<audio') === -1) {
         row.remove();
     }
  });
  updateRowNumbers('blocksContainer');

  const textHtml = blocksContainer.innerHTML.trim();
  if (!textHtml) {
    document.getElementById("editorOverlay").classList.remove("active");
    if (shouldPopHistory && history.state && history.state.isEditing) history.back();
    return;
  }

  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);

  if (currentActiveId) {
    store.get(currentActiveId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) { note.text = textHtml; store.put(note); }
    };
  } else {
    store.add({ text: textHtml, date: getFormattedDate(), order: Date.now() });
  }
  
  tx.oncomplete = () => {
    loadNotes();
    document.getElementById("editorOverlay").classList.remove("active");
    if (shouldPopHistory && history.state && history.state.isEditing) history.back();
    showSnackbar("Saved successfully");
  };
}

window.addEventListener('popstate', function (event) {
  if (document.getElementById("editorOverlay").classList.contains("active")) closeEditor(false); 
  else if (document.getElementById("previewOverlay").classList.contains("active")) closePreview(false);
});

/* ================= Editor Media ================= */
let lastFocusedRow = null;
document.addEventListener('focusin', function(e) {
  if (e.target.classList.contains('row-content')) lastFocusedRow = e.target;
});

// Inline Audio fix
let mediaRecorder; let audioChunks = []; let isRecording = false;
async function toggleRecording() {
  const btn = document.getElementById("inlineVoiceBtn");
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
      
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => { 
          // Audio stays inline with text
          const audioHtml = `&nbsp;<audio controls src="${reader.result}" style="display:inline-block; vertical-align:middle; height:35px; max-width:200px; border-radius:20px;"></audio>&nbsp;`;
          if(lastFocusedRow && document.getElementById('blocksContainer').contains(lastFocusedRow)) {
            lastFocusedRow.focus();
            document.execCommand('insertHTML', false, audioHtml);
          } else {
            const rows = document.getElementById('blocksContainer').querySelectorAll('.row-content');
            if(rows.length > 0) rows[rows.length-1].innerHTML += audioHtml;
            else { addRow('note', false); document.getElementById('blocksContainer').querySelector('.row-content').innerHTML += audioHtml; }
          }
        };
        reader.readAsDataURL(audioBlob);
      };
      mediaRecorder.start(); isRecording = true;
      btn.innerHTML = "⏹️"; btn.classList.add("recording");
    } catch (err) { showSnackbar("Microphone access needed."); }
  } else {
    mediaRecorder.stop(); isRecording = false;
    btn.innerHTML = "🎙️"; btn.classList.remove("recording");
  }
}

// Inline Image Attachment
let pressTimer;
document.getElementById('blocksContainer').addEventListener('touchstart', (e) => {
  if(e.touches.length > 1) return;
  if(e.target.classList.contains('row-content') || e.target.closest('.row-content')) {
    lastFocusedRow = e.target.classList.contains('row-content') ? e.target : e.target.closest('.row-content');
    pressTimer = setTimeout(() => { document.getElementById('inlineImageInput').click(); }, 700);
  }
}, {passive: true});

const clearPress = () => clearTimeout(pressTimer);
document.getElementById('blocksContainer').addEventListener('touchend', clearPress);
document.getElementById('blocksContainer').addEventListener('touchmove', clearPress);
document.getElementById('blocksContainer').addEventListener('mousedown', (e) => {
  if(e.target.classList.contains('row-content') || e.target.closest('.row-content')) {
    lastFocusedRow = e.target.classList.contains('row-content') ? e.target : e.target.closest('.row-content');
    pressTimer = setTimeout(() => { document.getElementById('inlineImageInput').click(); }, 700);
  }
});
document.getElementById('blocksContainer').addEventListener('mouseup', clearPress);
document.getElementById('blocksContainer').addEventListener('mouseleave', clearPress);

window.toggleInlineImage = function(triggerSpan) {
  const imgElement = triggerSpan.nextElementSibling;
  if (imgElement && imgElement.tagName === 'IMG') {
    imgElement.style.display = imgElement.style.display === 'none' ? 'block' : 'none';
  }
};

document.getElementById('inlineImageInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 1200;
      let width = img.width, height = img.height;
      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const base64Str = canvas.toDataURL("image/jpeg", 0.7);
      
      let imgHtml = `&nbsp;<span style="display:inline-block;"><span class="img-trigger" onclick="toggleInlineImage(this)" style="color:var(--accent); cursor:pointer; background:rgba(14,165,233,0.1); padding:2px 6px; border-radius:4px; font-size:12px; font-weight:bold;">🖼️ View Image</span><img src="${base64Str}" style="display: none; width: 100%; max-width: 300px; border-radius: 8px; margin-top: 5px; border: 1px solid var(--accent);"></span>&nbsp;`;
      
      if(lastFocusedRow && document.getElementById('blocksContainer').contains(lastFocusedRow)) {
        lastFocusedRow.focus();
        document.execCommand('insertHTML', false, imgHtml);
      } else {
        const rows = document.getElementById('blocksContainer').querySelectorAll('.row-content');
        if(rows.length > 0) rows[rows.length-1].innerHTML += imgHtml;
      }
      this.value = ""; 
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

/* ================= Drag & Drop inside Editor ================= */
let draggedEditorRow = null;
document.getElementById('blocksContainer').addEventListener('touchstart', (e) => {
  if(e.target.classList.contains('drag-handle')) {
    draggedEditorRow = e.target.closest('.task-row');
    draggedEditorRow.classList.add('dragging-row');
    e.preventDefault(); 
  }
}, {passive: false});

document.getElementById('blocksContainer').addEventListener('touchmove', (e) => {
  if(!draggedEditorRow) return;
  e.preventDefault();
  const touch = e.touches[0];
  const container = document.getElementById('blocksContainer');
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const targetRow = target ? target.closest('.task-row') : null;
  
  if (targetRow && targetRow !== draggedEditorRow) {
    const rect = targetRow.getBoundingClientRect();
    if (touch.clientY < rect.top + rect.height / 2) container.insertBefore(draggedEditorRow, targetRow);
    else container.insertBefore(draggedEditorRow, targetRow.nextSibling);
  }
}, {passive: false});

document.getElementById('blocksContainer').addEventListener('touchend', (e) => {
  if(draggedEditorRow) {
    draggedEditorRow.classList.remove('dragging-row');
    draggedEditorRow = null;
    updateRowNumbers('blocksContainer');
  }
});

/* ================= Backup Import/Export ================= */
function exportNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
    const data = JSON.stringify(e.target.result);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `SmartNotes_Backup_${new Date().getTime()}.json`; a.click();
  };
}

document.getElementById("importInput").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (Array.isArray(importedData)) {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        importedData.forEach(note => { delete note.id; store.add(note); });
        tx.oncomplete = () => { showSnackbar("Imported Successfully!"); loadNotes(); };
      }
    } catch (err) { showSnackbar("Invalid backup file!"); }
  };
  reader.readAsText(file);
});
</script>
