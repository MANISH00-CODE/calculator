<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --accent: #0ea5e9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); 
    color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; 
  }

  /* Header & Top Bar */
  .top { 
    padding: 15px; background: var(--bg-card); box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
    display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;
  }
  .top h2 { margin: 0; font-size: 20px; color: var(--accent); }
  
  .header-actions { display: flex; gap: 10px; }
  .btn-small { 
    background: var(--bg-input); color: var(--text-main); border: none; 
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; 
    font-family: 'Poppins', sans-serif; transition: 0.2s;
  }
  .btn-small:hover { background: var(--accent); color: white; }

  /* Input Section */
  .input-section { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  textarea { 
    width: 100%; padding: 12px; background: var(--bg-input); border: 2px solid transparent; 
    border-radius: 10px; color: var(--text-main); font-family: 'Poppins', sans-serif; 
    font-size: 14px; resize: none; outline: none; box-sizing: border-box; min-height: 80px;
  }
  textarea:focus { border-color: var(--accent); }
  
  .action-row { display: flex; gap: 10px; }
  .btn-action { 
    flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; 
    font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
    font-family: 'Poppins', sans-serif; color: white;
  }
  .btn-text { background: var(--accent); }
  .btn-photo { background: var(--success); }
  .btn-voice { background: var(--warning); }
  .btn-recording { background: var(--danger); animation: pulse 1.5s infinite; }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* Notes Container & Cards */
  #notes-container { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
  
  .note-card {
    background: var(--bg-card); padding: 15px; border-radius: 12px; 
    border-left: 4px solid var(--accent); display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative;
    /* Touch actions allow scrolling but let us hijack hold-to-drag */
    touch-action: pan-y; 
  }
  .note-card.dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed var(--accent); }

  .note-header { display: flex; justify-content: space-between; align-items: center; }
  .note-date { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  
  .note-controls { display: flex; gap: 10px; align-items: center; }
  .drag-handle { cursor: grab; font-size: 18px; color: var(--text-muted); padding: 5px; }
  .btn-delete { 
    background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; 
    border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; 
    justify-content: center; font-size: 14px; cursor: pointer;
  }

  /* Media Elements */
  .note-text { font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
  .note-img { max-width: 100%; border-radius: 8px; max-height: 300px; object-fit: cover; }
  audio { width: 100%; height: 40px; outline: none; }

  /* Bottom Navigation Bar */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
    background: var(--bg-card); display: flex; justify-content: space-around;
    align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 100;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted); font-size: 11px;
    display: flex; flex-direction: column; align-items: center; cursor: pointer;
    text-decoration: none; transition: 0.2s;
  }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  
  .action-fab {
    background: var(--accent); color: white; width: 50px; height: 50px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4);
    cursor: pointer; text-decoration: none; margin-top: -20px; 
  }
</style>
</head>
<body>

<input type="file" id="imageInput" accept="image/*" style="display: none;">
<input type="file" id="importInput" accept=".json" style="display: none;">

<div class="top">
  <h2>📝 Smart Notes</h2>
  <div class="header-actions">
    <button class="btn-small" onclick="exportNotes()">📤 Export</button>
    <button class="btn-small" onclick="document.getElementById('importInput').click()">📥 Import</button>
  </div>
</div>

<div class="input-section">
  <textarea id="textInput" placeholder="Write a note here..."></textarea>
  <div class="action-row">
    <button class="btn-action btn-text" onclick="addTextNote()">➕ Save Text</button>
    <button class="btn-action btn-photo" onclick="document.getElementById('imageInput').click()">📷 Photo</button>
    <button class="btn-action btn-voice" id="voiceBtn" onclick="toggleRecording()">🎙️ Voice</button>
  </div>
</div>

<div id="notes-container">
  </div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  <a href="index.html" class="action-fab">🧮</a>
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

<script>
/* =========================================
   1. IndexedDB Engine Setup
   ========================================= */
const DB_NAME = "ProSmartNotes";
const STORE_NAME = "notes_store";
let db;

const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains(STORE_NAME)) {
    // order property indexing for drag and drop
    const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    store.createIndex("order", "order", { unique: false });
  }
};
request.onsuccess = (e) => {
  db = e.target.result;
  loadNotes();
};
request.onerror = (e) => console.error("Database Error:", e);

/* =========================================
   2. Helper Functions (Date & Saving)
   ========================================= */
function getFormattedDate() {
  const date = new Date();
  const day = date.getDate();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  return `${day} ${monthNames[date.getMonth()]}, ${dayNames[date.getDay()]}, ${date.getFullYear()}`;
}

function saveNoteToDB(noteObj) {
  noteObj.date = getFormattedDate();
  noteObj.order = Date.now(); // For sorting
  
  const tx = db.transaction(STORE_NAME, "readwrite");
  tx.objectStore(STORE_NAME).add(noteObj);
  tx.oncomplete = () => loadNotes();
}

/* =========================================
   3. Note Creation (Text, Photo, Voice)
   ========================================= */
// Text Note
function addTextNote() {
  const text = document.getElementById("textInput").value.trim();
  if (!text) return;
  saveNoteToDB({ type: "text", content: text });
  document.getElementById("textInput").value = "";
}

// Photo Note (With Compression)
document.getElementById("imageInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      // Compress Image using Canvas
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 800; // Resize to max 800px width
      let width = img.width;
      let height = img.height;
      
      if (width > MAX_WIDTH) {
        height = Math.round((height * MAX_WIDTH) / width);
        width = MAX_WIDTH;
      }
      
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      
      // Save 70% quality JPEG (Massive space saving)
      const compressedDataUrl = canvas.toDataURL("image/jpeg", 0.7);
      saveNoteToDB({ type: "image", content: compressedDataUrl });
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

// Voice Note
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
  const btn = document.getElementById("voiceBtn");
  
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
      
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => saveNoteToDB({ type: "audio", content: reader.result });
        reader.readAsDataURL(audioBlob);
        audioChunks = [];
      };
      
      mediaRecorder.start();
      isRecording = true;
      btn.innerHTML = "⏹️ Stop";
      btn.classList.add("btn-recording");
    } catch (err) {
      alert("Microphone permission denied!");
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.innerHTML = "🎙️ Voice";
    btn.classList.remove("btn-recording");
  }
}

/* =========================================
   4. Rendering and Deleting
   ========================================= */
function loadNotes() {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  
  const tx = db.transaction(STORE_NAME, "readonly");
  const store = tx.objectStore(STORE_NAME);
  // Sort by order descending
  const request = store.index("order").openCursor(null, "prev");
  
  request.onsuccess = (e) => {
    const cursor = e.target.result;
    if (cursor) {
      const note = cursor.value;
      const card = document.createElement("div");
      card.className = "note-card";
      card.dataset.id = note.id;
      
      let contentHtml = "";
      if (note.type === "text") contentHtml = `<div class="note-text">${note.content}</div>`;
      if (note.type === "image") contentHtml = `<img class="note-img" src="${note.content}">`;
      if (note.type === "audio") contentHtml = `<audio controls src="${note.content}"></audio>`;

      card.innerHTML = `
        <div class="note-header">
          <span class="note-date">${note.date}</span>
          <div class="note-controls">
            <span class="drag-handle">↕️</span>
            <button class="btn-delete" onclick="deleteNote(${note.id})">🗑️</button>
          </div>
        </div>
        ${contentHtml}
      `;
      
      setupTouchDrag(card);
      container.appendChild(card);
      cursor.continue();
    }
  };
}

function deleteNote(id) {
  if(confirm("Delete this note?")) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => loadNotes();
  }
}

/* =========================================
   5. Mobile-Friendly Drag & Drop (Native JS)
   ========================================= */
let draggedElement = null;

function setupTouchDrag(card) {
  const handle = card.querySelector('.drag-handle');
  
  // Desktop Mouse Events
  handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
  card.addEventListener('dragstart', (e) => {
    draggedElement = card;
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    card.removeAttribute('draggable');
    saveNewOrder();
  });

  // Mobile Touch Events
  handle.addEventListener('touchstart', (e) => {
    draggedElement = card;
    card.classList.add('dragging');
    // Prevent default scrolling when dragging handle
    e.preventDefault(); 
  }, { passive: false });

  handle.addEventListener('touchmove', (e) => {
    if (!draggedElement) return;
    e.preventDefault();
    const touch = e.touches[0];
    // Find element under finger
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target ? target.closest('.note-card') : null;
    
    if (targetCard && targetCard !== draggedElement) {
      const container = document.getElementById("notes-container");
      const targetRect = targetCard.getBoundingClientRect();
      // Drop above or below based on touch position
      if (touch.clientY < targetRect.top + targetRect.height / 2) {
        container.insertBefore(draggedElement, targetCard);
      } else {
        container.insertBefore(draggedElement, targetCard.nextSibling);
      }
    }
  }, { passive: false });

  handle.addEventListener('touchend', () => {
    if (draggedElement) {
      draggedElement.classList.remove('dragging');
      draggedElement = null;
      saveNewOrder();
    }
  });
}

// Drag over logic for desktop
document.getElementById('notes-container').addEventListener('dragover', (e) => {
  e.preventDefault();
  const draggingCard = document.querySelector('.dragging');
  const cards = [...document.querySelectorAll('.note-card:not(.dragging)')];
  
  // Find nearest card
  let nextCard = cards.find(card => {
    return e.clientY <= card.getBoundingClientRect().top + card.offsetHeight / 2;
  });
  
  if (nextCard) {
    document.getElementById('notes-container').insertBefore(draggingCard, nextCard);
  } else {
    document.getElementById('notes-container').appendChild(draggingCard);
  }
});

// Save Reordered positions to DB
function saveNewOrder() {
  const cards = document.querySelectorAll('.note-card');
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  
  // We want top item to have highest order timestamp
  let baseTime = Date.now();
  
  cards.forEach((card, index) => {
    const id = parseInt(card.dataset.id);
    const request = store.get(id);
    request.onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        note.order = baseTime - index; // Ensure descending order
        store.put(note);
      }
    };
  });
}

/* =========================================
   6. Export & Import Features
   ========================================= */
function exportNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
    const data = JSON.stringify(e.target.result);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement("a");
    a.href = url;
    a.download = `SmartNotes_Backup_${new Date().getTime()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
}

document.getElementById("importInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (Array.isArray(importedData)) {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        
        importedData.forEach(note => {
          delete note.id; // Let autoIncrement generate new IDs to avoid conflicts
          store.add(note);
        });
        
        tx.oncomplete = () => {
          alert("Notes Imported Successfully!");
          loadNotes();
        };
      }
    } catch (err) {
      alert("Invalid backup file!");
    }
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
