<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --accent: #0ea5e9;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }
  body { 
    margin: 0; 
    font-family: 'Poppins', sans-serif; 
    background: var(--bg-main); 
    color: var(--text-main); 
  }
  
  /* Bottom Navigation Bar CSS */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
    background: var(--bg-card); display: flex; justify-content: space-around;
    align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 10;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted); font-size: 11px;
    display: flex; flex-direction: column; align-items: center; cursor: pointer;
    text-decoration: none; transition: 0.2s;
  }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  
  .action-fab {
    background: var(--accent); color: white; width: 50px; height: 50px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4);
    cursor: pointer; text-decoration: none; margin-top: -20px; 
  }
  .action-fab:active { transform: scale(0.95); }

  /* Page Content Centered */
  .content {
    display: flex; flex-direction: column; align-items: center; 
    justify-content: center; height: 80vh; text-align: center;
  }
</style>
</head>
<body>

<div class="content">
  <h1>📝</h1>
  <h2>Notes Page</h2>
  <p style="color: var(--text-muted);">Connection successful! Ab aap yahan notes ka code likh sakte hain.</p>
</div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  
  <a href="index.html" class="action-fab">🧮</a>
  
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

</body>
</html>
