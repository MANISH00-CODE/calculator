<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notes Pro V7</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Offline Support Ready!'))
        .catch(err => console.error('Offline Error:', err));
    });
  }
</script>
<style>
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-input: #334155;
    --accent: #0ea5e9;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }

  body { 
    margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); 
    color: var(--text-main); overflow-x: hidden; padding-bottom: 80px; 
  }

  /* Top Header & Search */
  .top { 
    padding: 15px 15px 5px 15px; background: var(--bg-card); 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-row h2 { margin: 0; font-size: 20px; color: var(--accent); }
  .header-actions { display: flex; gap: 10px; }
  
  .btn-small { 
    background: var(--bg-input); color: var(--text-main); border: none; 
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; 
    font-family: 'Poppins', sans-serif; transition: 0.2s; font-weight: 600; display: flex; align-items: center; gap: 4px;
  }

  /* Smart Search Bar */
  .search-wrapper { position: relative; width: 100%; padding-bottom: 10px; }
  .search-input {
    width: 100%; padding: 10px 15px; background: var(--bg-main); border: 1px solid var(--bg-input); 
    border-radius: 8px; color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 13px;
    outline: none; box-sizing: border-box; transition: 0.3s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* Floating Add Button */
  .fab-add {
    position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px;
    background: var(--accent); color: white; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 24px;
    box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; z-index: 90;
  }

  /* Notes Container & Compact List */
  #notes-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  
  .note-card {
    background: var(--bg-card); padding: 10px 12px; border-radius: 12px; 
    border-left: 4px solid var(--accent); display: flex; flex-direction: row; 
    align-items: center; gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; touch-action: pan-y; 
  }
  .note-card.dragging { opacity: 0.5; transform: scale(0.98); border: 2px dashed var(--accent); }
  
  /* Overlays (Preview & Editor) */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-main); z-index: 200; display: none; flex-direction: column;
  }
  .overlay.active { display: flex; }

  .overlay-header {
    padding: 10px 15px; background: var(--bg-card); display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .overlay-header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-close { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  
  .overlay-body { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; scroll-behavior: smooth; }
  
  /* Fixed Size Rich Text Editor */
  .rich-input-container {
    background: var(--bg-card); border-radius: 12px; border: 2px solid var(--bg-input); 
    display: flex; flex-direction: column; 
    height: 350px; min-height: 350px; max-height: 350px; /* Fixed height constraint as commanded */
  }
  .rich-input-container:focus-within { border-color: var(--accent); }

  .content-editor {
    flex: 1; padding: 15px; font-family: 'Poppins', sans-serif; font-size: 15px; line-height: 1.6;
    color: var(--text-main); overflow-y: auto; outline: none; word-wrap: break-word; white-space: pre-wrap;
  }
  
  /* Inline Tasks (Text + Audio) */
  .task-block { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 5px; padding: 5px; border-radius: 6px; transition: 0.2s; }
  .inline-checkbox { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; }
  .img-trigger { color: var(--accent); font-weight: bold; cursor: pointer; padding: 2px 5px; background: rgba(14, 165, 233, 0.1); border-radius: 4px; display: inline-block; user-select: none; }
  
  /* Toolbars */
  .inline-toolbar {
    display: flex; gap: 12px; padding: 10px 15px; background: rgba(0, 0, 0, 0.2);
    border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; align-items: center; flex-shrink: 0;
  }
  .media-btn {
    background: var(--bg-input); color: var(--text-main); border: none; width: 36px; height: 36px; 
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s;
  }
  .media-btn:active { transform: scale(0.9); }
  .media-btn.recording { background: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* Snackbar */
  #snackbar {
    visibility: hidden; min-width: 250px; background-color: var(--bg-input); color: #fff;
    text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed;
    z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); display: flex;
    justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s, bottom 0.3s; font-size: 14px; border: 1px solid var(--accent);
  }
  #snackbar.show { visibility: visible; opacity: 1; bottom: 90px; }
  .undo-btn { color: var(--accent); font-weight: bold; cursor: pointer; border: none; background: none; margin-left: 15px; font-family: inherit; font-size: 14px; padding: 5px 10px; border-radius: 6px; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 100; }
  .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; transition: 0.2s; }
  .nav-btn span { font-size: 20px; margin-bottom: 2px; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }
  .action-fab { background: var(--accent); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4); cursor: pointer; text-decoration: none; margin-top: -20px; }
</style>
</head>
<body>

<input type="file" id="inlineImageInput" accept="image/*" style="display: none;">
<input type="file" id="importInput" accept=".json" style="display: none;">

<div class="top">
  <div class="header-row">
    <h2>📝 Smart Notes</h2>
    <div class="header-actions">
      <button class="btn-small" onclick="exportNotes()">📤</button>
      <button class="btn-small" onclick="document.getElementById('importInput').click()">📥</button>
    </div>
  </div>
  <div class="search-wrapper">
    <input type="search" id="globalSearch" class="search-input" list="wordSuggestions" placeholder="🔍 Search in notes..." oninput="filterNotes()">
    <datalist id="wordSuggestions"></datalist>
  </div>
</div>

<div id="notes-container"></div>
<div class="fab-add" onclick="openEditor()">➕</div>

<!-- PREVIEW OVERLAY -->
<div class="overlay" id="previewOverlay">
  <div class="overlay-header">
    <span style="font-weight: 600; font-size: 16px;">View Note</span>
    <div class="overlay-header-actions">
      <button class="btn-small" style="background: rgba(16, 185, 129, 0.1); color: var(--success);" onclick="document.getElementById('previewBody').scrollTop = 0">⬆️ Top</button>
      <button class="btn-small" style="background: rgba(14, 165, 233, 0.1); color: var(--accent);" onclick="switchToEdit()">✏️ Edit</button>
      <button class="btn-small" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);" onclick="deleteFromPreview()">🗑️ Del</button>
      <button class="btn-close" onclick="closePreview()">✖ Back</button>
    </div>
  </div>
  <div class="overlay-body" id="previewBody">
    <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 5px;" id="previewDate"></div>
    <div id="previewContent" style="font-size: 15px; line-height: 1.6; word-wrap: break-word;"></div>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div class="overlay" id="editorOverlay">
  <div class="overlay-header">
    <span style="font-weight: 600; font-size: 16px;">Edit Note</span>
    <button class="btn-close" onclick="closeEditor()">💾 Save & Close</button>
  </div>
  
  <div class="overlay-body">
    <!-- Fixed Box Constraint Maintained -->
    <div class="rich-input-container">
      <div id="noteEditor" class="content-editor" contenteditable="true" placeholder="Type here. Checkbox, audio, or hold to insert image..."></div>
      
      <div class="inline-toolbar">
        <button class="media-btn" title="Add Checkbox" onclick="insertCheckboxBlock()">☑️</button>
        <button class="media-btn" id="inlineVoiceBtn" title="Record Voice" onclick="toggleRecording()">🎙️</button>
        <span style="font-size: 10px; color: var(--text-muted); margin-left: 5px;">Hold text to attach image 🖼️</span>
      </div>
    </div>
  </div>
</div>

<div id="snackbar">
  <span id="snackbarMsg">Note deleted</span>
  <button class="undo-btn" id="undoBtn" onclick="undoDelete()">UNDO</button>
</div>

<div class="bottom-nav">
  <a href="shopping.html" class="nav-btn"><span>🛒</span>Shopping</a>
  <a href="index.html" class="action-fab">🧮</a>
  <a href="notes.html" class="nav-btn active"><span>📝</span>Notes</a>
</div>

<script>
/* =========================================
   1. IndexedDB Engine Setup
   ========================================= */
const DB_NAME = "ProSmartNotesV7";
const STORE_NAME = "notes_multimedia";
let db;
let currentActiveId = null; 
let allNotesCache = []; 
let lastDeletedNote = null;
let undoTimeout = null;
let savedSelectionRange = null;

const request = indexedDB.open(DB_NAME, 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains(STORE_NAME)) {
    const store = db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
    store.createIndex("order", "order", { unique: false });
  }
};
request.onsuccess = (e) => { db = e.target.result; loadNotes(); };

function getFormattedDate() {
  const d = new Date();
  const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} | ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
}

function showSnackbar(msg, showUndo = false) {
  const snackbar = document.getElementById("snackbar");
  document.getElementById("snackbarMsg").innerText = msg;
  document.getElementById("undoBtn").style.display = showUndo ? "block" : "none";
  snackbar.classList.add("show");
  clearTimeout(undoTimeout);
  undoTimeout = setTimeout(() => { snackbar.classList.remove("show"); if(showUndo) lastDeletedNote = null; }, 5000);
}

/* =========================================
   2. List Rendering & Global Search
   ========================================= */
function filterNotes() {
  const query = document.getElementById("globalSearch").value.toLowerCase().trim();
  let sortedNotes = [...allNotesCache].sort((a, b) => b.order - a.order);
  if (query) {
    sortedNotes = sortedNotes.filter(note => {
      let t = (note.text || "").toLowerCase();
      return t.includes(query);
    });
  }
  renderNotesList(sortedNotes);
}

function updateWordSuggestions() {
  let words = new Set();
  allNotesCache.forEach(note => {
    let t = (note.text || "").replace(/<[^>]+>/g, ' ').toLowerCase(); // strip html for search
    let matchedWords = t.match(/[a-z0-9\u0900-\u097F]+/g);
    if (matchedWords) matchedWords.forEach(w => { if(w.length > 2) words.add(w) });
  });
  const datalist = document.getElementById("wordSuggestions");
  datalist.innerHTML = "";
  words.forEach(w => { datalist.innerHTML += `<option value="${w}">`; });
}

function loadNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  allNotesCache = [];
  tx.objectStore(STORE_NAME).index("order").openCursor(null, "prev").onsuccess = (e) => {
    const cursor = e.target.result;
    if (cursor) { allNotesCache.push(cursor.value); cursor.continue(); } 
    else { updateWordSuggestions(); filterNotes(); }
  };
}

function renderNotesList(notesArray) {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  
  if(notesArray.length === 0) {
     container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-size: 13px;">No matching notes found.</div>`; return;
  }

  notesArray.forEach((note, index) => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.dataset.id = note.id;
    
    // Extract first line of text for list preview (removing HTML tags safely)
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = note.text || "";
    let cleanText = tempDiv.innerText.trim();
    let firstLine = cleanText.split('\n')[0].substring(0, 50);
    
    let hasAudio = (note.text || "").includes("<audio") || (note.audios && note.audios.length > 0);
    let previewContent = firstLine ? `<span style="font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">${firstLine}</span>` 
                                   : (hasAudio ? `<span style="font-size: 12px; color: var(--accent);">🎵 Audio Attached</span>` : `<span style="font-size: 12px; color: var(--text-muted);">Empty Note</span>`);

    card.innerHTML = `
      <span class="drag-handle" style="cursor: grab; font-size: 18px; color: var(--text-muted); padding: 5px; flex-shrink: 0;">↕️</span>
      
      <span style="font-size: 14px; font-weight: bold; color: var(--accent); min-width: 22px; flex-shrink: 0; text-align: center;">${index + 1}.</span>

      <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; cursor: pointer;" onclick="openPreview(${note.id})">
         <span style="font-size: 10px; color: var(--text-muted); margin-bottom: 2px;">${note.date}</span>
         ${previewContent}
      </div>

      <button class="btn-delete" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; flex-shrink: 0;" onclick="deleteNoteFromList(event, ${note.id})">✖</button>
    `;
    setupTouchDrag(card); container.appendChild(card);
  });
}

function deleteNoteFromList(event, id) {
  event.stopPropagation(); 
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.get(id).onsuccess = (e) => { lastDeletedNote = e.target.result; store.delete(id); };
  tx.oncomplete = () => { loadNotes(); showSnackbar("Note Deleted", true); };
}
function undoDelete() {
  if (!lastDeletedNote) return;
  const tx = db.transaction(STORE_NAME, "readwrite");
  tx.objectStore(STORE_NAME).add(lastDeletedNote); 
  tx.oncomplete = () => { loadNotes(); document.getElementById("snackbar").classList.remove("show"); lastDeletedNote = null; clearTimeout(undoTimeout); };
}

let draggedElement = null;
function setupTouchDrag(card) {
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('mousedown', () => { card.setAttribute('draggable', 'true'); });
  card.addEventListener('dragstart', (e) => { draggedElement = card; setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); card.removeAttribute('draggable'); saveNewOrder(); });
  handle.addEventListener('touchstart', (e) => { draggedElement = card; card.classList.add('dragging'); e.preventDefault(); }, { passive: false });
  handle.addEventListener('touchmove', (e) => {
    if (!draggedElement) return; e.preventDefault();
    const touch = e.touches[0];
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target ? target.closest('.note-card') : null;
    if (targetCard && targetCard !== draggedElement) {
      const container = document.getElementById("notes-container");
      const targetRect = targetCard.getBoundingClientRect();
      if (touch.clientY < targetRect.top + targetRect.height / 2) container.insertBefore(draggedElement, targetCard);
      else container.insertBefore(draggedElement, targetCard.nextSibling);
    }
  }, { passive: false });
  handle.addEventListener('touchend', () => { if (draggedElement) { draggedElement.classList.remove('dragging'); draggedElement = null; saveNewOrder(); } });
}
function saveNewOrder() {
  if(document.getElementById("globalSearch").value) return; 
  const cards = document.querySelectorAll('.note-card');
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  let baseTime = Date.now();
  cards.forEach((card, index) => {
    const id = parseInt(card.dataset.id);
    store.get(id).onsuccess = (e) => { const note = e.target.result; if (note) { note.order = baseTime - index; store.put(note); } };
  });
  tx.oncomplete = () => loadNotes();
}

/* =========================================
   3. Preview Mode Logic
   ========================================= */
function openPreview(id) {
  currentActiveId = id;
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).get(id).onsuccess = (e) => {
    const note = e.target.result;
    if (note) {
      document.getElementById("previewDate").innerText = note.date;
      
      // Backward compatibility for old images/audios array
      let extraHtml = "";
      if (note.images && note.images.length > 0) {
        extraHtml += `<br><br><div style="display:flex; flex-wrap:wrap; gap:10px;">` + note.images.map(img => `<img src="${img}" style="max-width:100%; border-radius:8px;">`).join('') + `</div>`;
      }
      if (note.audios && note.audios.length > 0) {
        extraHtml += `<br>` + note.audios.map(aud => `<audio controls src="${aud}" style="width:100%; margin-top:10px;"></audio>`).join('');
      }

      // Render content
      document.getElementById("previewContent").innerHTML = (note.text || "") + extraHtml;
      document.getElementById("previewOverlay").classList.add("active");
      history.pushState({ isPreview: true }, "");
    }
  };
}

function closePreview() {
  document.getElementById("previewOverlay").classList.remove("active");
  currentActiveId = null;
  loadNotes(); // Refresh list to reflect checked tasks
  if (history.state && history.state.isPreview) history.back();
}

function deleteFromPreview() {
  if(currentActiveId) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.get(currentActiveId).onsuccess = (e) => { lastDeletedNote = e.target.result; store.delete(currentActiveId); };
    tx.oncomplete = () => { 
      closePreview(); 
      showSnackbar("Note Deleted", true); 
    };
  }
}

function switchToEdit() {
  document.getElementById("previewOverlay").classList.remove("active");
  openEditor(currentActiveId);
}

// Checkbox Toggle logic applied dynamically via onclick in HTML
window.toggleInlineTask = function(checkbox) {
  const block = checkbox.closest('.task-block') || checkbox.parentElement;
  if (checkbox.checked) {
    block.style.textDecoration = 'line-through';
    block.style.opacity = '0.6';
  } else {
    block.style.textDecoration = 'none';
    block.style.opacity = '1';
  }
  
  // Auto-save changes if done in preview mode
  if (document.getElementById("previewOverlay").classList.contains("active") && currentActiveId) {
    const contentHtml = document.getElementById("previewContent").innerHTML;
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    store.get(currentActiveId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        // Only saving the updated HTML back to note.text 
        // (For old data, we strip the extra appended HTML to avoid duplication)
        let saveHtml = contentHtml;
        if(note.images && note.images.length > 0) saveHtml = saveHtml.split('<br><br><div style="display:flex')[0];
        note.text = saveHtml;
        store.put(note);
      }
    };
  }
};

window.toggleInlineImage = function(triggerSpan) {
  const imgElement = triggerSpan.nextElementSibling;
  if (imgElement && imgElement.tagName === 'IMG') {
    imgElement.style.display = imgElement.style.display === 'none' ? 'block' : 'none';
  }
};

/* =========================================
   4. Rich Editor & Media Logic
   ========================================= */
function saveSelection() {
  if (window.getSelection) {
    let sel = window.getSelection();
    if (sel.getRangeAt && sel.rangeCount) savedSelectionRange = sel.getRangeAt(0);
  }
}
function restoreSelection() {
  if (savedSelectionRange) {
    let sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedSelectionRange);
  }
}

function openEditor(noteId = null) {
  currentActiveId = noteId;
  const editor = document.getElementById("noteEditor");
  editor.innerHTML = "";
  
  if (noteId) {
    const tx = db.transaction(STORE_NAME, "readonly");
    tx.objectStore(STORE_NAME).get(noteId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) {
        editor.innerHTML = note.text || "";
        // Migrate old media to inline blocks if they are not already integrated
        if (note.images && note.images.length > 0) {
          note.images.forEach(img => {
            editor.innerHTML += `<div style="margin: 10px 0;"><span class="img-trigger" onclick="toggleInlineImage(this)">🖼️ Image attached</span><img src="${img}" style="display:none; max-width:100%; border-radius:8px; margin-top:5px; border: 1px solid var(--accent);"></div>`;
          });
          note.images = []; // Clear array after migration
        }
        if (note.audios && note.audios.length > 0) {
          note.audios.forEach(aud => {
            editor.innerHTML += `<div class="task-block"><input type="checkbox" class="inline-checkbox" onclick="toggleInlineTask(this)">&nbsp;<audio controls src="${aud}" style="height: 35px; max-width: 200px; vertical-align: middle;"></audio></div>`;
          });
          note.audios = [];
        }
      }
    };
  }
  
  document.getElementById("editorOverlay").classList.add("active");
  history.pushState({ isEditing: true }, "");
  
  setTimeout(() => { editor.focus(); }, 100);
}

function closeEditor(shouldPopHistory = true) {
  const textHtml = document.getElementById("noteEditor").innerHTML.trim();
  if (!textHtml) {
    document.getElementById("editorOverlay").classList.remove("active");
    if (shouldPopHistory && history.state && history.state.isEditing) history.back();
    return;
  }

  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);

  if (currentActiveId) {
    store.get(currentActiveId).onsuccess = (e) => {
      const note = e.target.result;
      if (note) { note.text = textHtml; store.put(note); }
    };
  } else {
    store.add({ text: textHtml, images: [], audios: [], date: getFormattedDate(), order: Date.now() });
  }
  
  tx.oncomplete = () => {
    loadNotes();
    document.getElementById("editorOverlay").classList.remove("active");
    if (shouldPopHistory && history.state && history.state.isEditing) history.back();
    showSnackbar("Saved successfully");
  };
}

window.addEventListener('popstate', function (event) {
  if (document.getElementById("editorOverlay").classList.contains("active")) closeEditor(false); 
  else if (document.getElementById("previewOverlay").classList.contains("active")) closePreview();
});

function insertCheckboxBlock() {
  document.getElementById("noteEditor").focus();
  document.execCommand('insertHTML', false, '<div class="task-block"><input type="checkbox" class="inline-checkbox" onclick="toggleInlineTask(this)">&nbsp;<span></span></div><br>');
}

/* Voice Recording */
let mediaRecorder; let audioChunks = []; let isRecording = false;
async function toggleRecording() {
  const btn = document.getElementById("inlineVoiceBtn");
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
      
      saveSelection(); // Save cursor position before recording ends
      
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => { 
          restoreSelection();
          // Insert Audio next to text (can be inside task block)
          document.execCommand('insertHTML', false, `&nbsp;<audio controls src="${reader.result}" style="height: 35px; max-width: 200px; vertical-align: middle; border-radius: 20px;"></audio>&nbsp;`);
        };
        reader.readAsDataURL(audioBlob);
      };
      mediaRecorder.start(); isRecording = true;
      btn.innerHTML = "⏹️"; btn.classList.add("recording");
    } catch (err) { console.error("Microphone denied!", err); showSnackbar("Microphone access needed."); }
  } else {
    mediaRecorder.stop(); isRecording = false;
    btn.innerHTML = "🎙️"; btn.classList.remove("recording");
  }
}

/* Long Press for Image Attachment */
let pressTimer;
const editorDiv = document.getElementById('noteEditor');

editorDiv.addEventListener('touchstart', (e) => {
  if(e.touches.length > 1) return;
  pressTimer = setTimeout(() => {
    saveSelection();
    document.getElementById('inlineImageInput').click();
  }, 700); // 700ms long press
});
editorDiv.addEventListener('touchend', () => clearTimeout(pressTimer));
editorDiv.addEventListener('touchmove', () => clearTimeout(pressTimer));

// Fallback for Desktop/Mouse hold
editorDiv.addEventListener('mousedown', (e) => {
  pressTimer = setTimeout(() => {
    saveSelection();
    document.getElementById('inlineImageInput').click();
  }, 700);
});
editorDiv.addEventListener('mouseup', () => clearTimeout(pressTimer));
editorDiv.addEventListener('mouseleave', () => clearTimeout(pressTimer));

document.getElementById('inlineImageInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 1200;
      let width = img.width, height = img.height;
      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const base64Str = canvas.toDataURL("image/jpeg", 0.7);
      
      restoreSelection();
      // Insert hidden image with trigger text as per user requirement
      let imgHtml = `<span style="display: inline-block; margin: 0 5px;"><span class="img-trigger" onclick="toggleInlineImage(this)">🖼️ Image attached</span><img src="${base64Str}" style="display: none; max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.2);"></span>&nbsp;`;
      document.execCommand('insertHTML', false, imgHtml);
      this.value = ""; // reset file input
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

/* =========================================
   5. Import / Export
   ========================================= */
function exportNotes() {
  const tx = db.transaction(STORE_NAME, "readonly");
  tx.objectStore(STORE_NAME).getAll().onsuccess = (e) => {
    const data = JSON.stringify(e.target.result);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `SmartNotes_Backup_${new Date().getTime()}.json`; a.click();
  };
}

document.getElementById("importInput").addEventListener("change", function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    try {
      const importedData = JSON.parse(event.target.result);
      if (Array.isArray(importedData)) {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        importedData.forEach(note => { delete note.id; store.add(note); });
        tx.oncomplete = () => { showSnackbar("Imported Successfully!"); loadNotes(); };
      }
    } catch (err) { showSnackbar("Invalid backup file!"); }
  };
  reader.readAsText(file);
});
</script>
